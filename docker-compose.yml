services:
  app:
    build: .
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 53123
      DATA_DIR: /app/data
      COOKIE_SECURE: "true"
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-28800}
    volumes:
      # Conserva la base JSON al actualizar o recrear el contenedor.
      - ./data:/app/data
    expose:
      - "53123"

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
